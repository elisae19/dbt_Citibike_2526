name: 'citibike_analytics'
version: '1.0.0'
config-version: 2

profile: 'citibike_analytics'

model-paths: ["models"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  # bascule utilisée dans les sources pour ne pointer que sur un échantillon
  # en dev, et sur la table complète en prod (voir _citibike__sources.yml
  # et la macro citibike_source() ci-dessous)
  citibike_sample_dataset: "raw_citibike_sample"
  citibike_full_dataset: "raw_citibike"

models:
  citibike_analytics:
    staging:
      +materialized: view
    intermediate:
      +materialized: table
    marts:
      +materialized: table
